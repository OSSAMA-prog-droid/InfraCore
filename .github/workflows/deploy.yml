name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/axiom-api:$IMAGE_TAG .
          docker push $ECR_REGISTRY/axiom-api:$IMAGE_TAG

      - name: Verify required secrets are configured
        if: |
          secrets.DB_PASSWORD == '' ||
          secrets.JWT_SECRET == '' ||
          secrets.STRIPE_API_KEY == ''
        run: |
          echo "ERROR: One or more required secrets are not configured."
          exit 1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name axiom-production --region us-east-1

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f kubernetes/ --recursive

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/api -n axiom --timeout=300s
          kubectl rollout status deployment/frontend -n axiom --timeout=300s
