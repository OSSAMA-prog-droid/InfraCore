apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: axiom
  labels:
    app: frontend
spec:
  # BUG IC-13: replicas: 1 means any voluntary disruption — a node drain
  # during a cluster upgrade, a spot instance reclaim, or a kubectl rollout —
  # causes complete frontend downtime while the pod reschedules.
  # Without a PodDisruptionBudget, Kubernetes has no constraint preventing it
  # from evicting this single pod whenever it needs to.
  # Fix: set replicas to at least 2, and add a PodDisruptionBudget with
  # minAvailable: 1 to guarantee at least one replica stays up during
  # voluntary disruptions.
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: axiom/frontend:3.2.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: api_url
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
