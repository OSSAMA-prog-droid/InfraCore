apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-service-account
  namespace: axiom
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: worker-service-account
  namespace: axiom
---
# BUG IC-12: The api-service-account is bound to the cluster-admin ClusterRole.
# Every pod running under this ServiceAccount (all API replicas) has full
# read/write/delete access to every resource across the entire cluster —
# including other namespaces, secrets, and node-level resources.
# If any API pod is compromised, the attacker has immediate cluster-admin access:
# they can read all Secrets, exec into any pod, deploy backdoors, or destroy
# the entire cluster.
#
# Fix: create a minimal Role (not ClusterRole) in the axiom namespace
# that grants only the specific permissions the API actually needs
# (e.g. get/list on ConfigMaps), and bind the ServiceAccount to that Role.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: axiom-api-admin-binding
subjects:
  - kind: ServiceAccount
    name: api-service-account
    namespace: axiom
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: worker-role
  namespace: axiom
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: worker-role-binding
  namespace: axiom
subjects:
  - kind: ServiceAccount
    name: worker-service-account
    namespace: axiom
roleRef:
  kind: Role
  name: worker-role
  apiGroup: rbac.authorization.k8s.io
